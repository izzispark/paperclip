services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: paperclip
      POSTGRES_DB: paperclip
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 2s
      timeout: 5s
      retries: 30
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://paperclip:paperclip@db:5432/paperclip
      PORT: "3100"
      SERVE_UI: "true"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
      INFISICAL_MACHINE_CLIENT_ID: "${INFISICAL_MACHINE_CLIENT_ID:-}"
      INFISICAL_MACHINE_CLIENT_SECRET: "${INFISICAL_MACHINE_CLIENT_SECRET:-}"
      INFISICAL_PROJECT_ID: "${INFISICAL_PROJECT_ID:-}"
      INFISICAL_SECRET_ENV: "${INFISICAL_SECRET_ENV:-prod}"
      INFISICAL_API_URL: "${INFISICAL_API_URL:-https://app.infisical.com/api}"
      INFISICAL_CONFIG_DIR: "${INFISICAL_CONFIG_DIR:-/paperclip/.infisical}"
    volumes:
      - paperclip-data:/paperclip
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  paperclip-data:
